openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Mishwar - Complete ride hailing and group trips platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: drivers
  - name: rides
  - name: groupTrips
  - name: subscriptions
  - name: inviteTrips
  - name: rentals
  - name: driverBookings
  - name: driverPortal
  - name: admin
  - name: stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Rides
  /rides:
    get:
      operationId: listRides
      tags: [rides]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, in_progress, completed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideList"
    post:
      operationId: createRide
      tags: [rides]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRideBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"

  /rides/{rideId}:
    get:
      operationId: getRide
      tags: [rides]
      parameters:
        - name: rideId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
    patch:
      operationId: updateRide
      tags: [rides]
      parameters:
        - name: rideId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRideBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"

  # Group Trips
  /group-trips:
    get:
      operationId: listGroupTrips
      tags: [groupTrips]
      parameters:
        - name: fromCity
          in: query
          schema:
            type: string
        - name: toCity
          in: query
          schema:
            type: string
        - name: scheduleType
          in: query
          schema:
            type: string
            enum: [weekly, monthly, one_time]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupTripList"
    post:
      operationId: createGroupTrip
      tags: [groupTrips]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupTripBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupTrip"

  /group-trips/{groupTripId}:
    get:
      operationId: getGroupTrip
      tags: [groupTrips]
      parameters:
        - name: groupTripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupTrip"
    patch:
      operationId: updateGroupTrip
      tags: [groupTrips]
      parameters:
        - name: groupTripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupTripBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupTrip"

  /group-trips/{groupTripId}/register:
    post:
      operationId: registerForGroupTrip
      tags: [groupTrips]
      parameters:
        - name: groupTripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterGroupTripBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupTripRegistration"

  /group-trips/{groupTripId}/registrations:
    get:
      operationId: listGroupTripRegistrations
      tags: [groupTrips]
      parameters:
        - name: groupTripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupTripRegistrationList"

  # Subscriptions
  /subscriptions:
    get:
      operationId: listSubscriptions
      tags: [subscriptions]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionList"
    post:
      operationId: createSubscription
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/{subscriptionId}:
    get:
      operationId: getSubscription
      tags: [subscriptions]
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
    delete:
      operationId: cancelSubscription
      tags: [subscriptions]
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  # Drivers
  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverList"
    post:
      operationId: createDriver
      tags: [drivers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriverBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{driverId}:
    get:
      operationId: getDriver
      tags: [drivers]
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # Invite Trips
  /invite-trips:
    get:
      operationId: listInviteTrips
      tags: [inviteTrips]
      summary: List my invite trips
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteTripList"
    post:
      operationId: createInviteTrip
      tags: [inviteTrips]
      summary: Create an invite trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteTripBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteTrip"

  /invite-trips/{inviteTripId}:
    get:
      operationId: getInviteTrip
      tags: [inviteTrips]
      parameters:
        - name: inviteTripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteTrip"
    patch:
      operationId: updateInviteTrip
      tags: [inviteTrips]
      parameters:
        - name: inviteTripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInviteTripBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteTrip"

  /invite/{inviteCode}:
    get:
      operationId: getInviteTripByCode
      tags: [inviteTrips]
      summary: Get trip by invite code (public)
      parameters:
        - name: inviteCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteTrip"

  /invite/{inviteCode}/respond:
    post:
      operationId: respondToInvite
      tags: [inviteTrips]
      summary: Accept or decline an invite
      parameters:
        - name: inviteCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RespondToInviteBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteGuest"

  /invite-trips/{inviteTripId}/confirm:
    post:
      operationId: confirmInviteTrip
      tags: [inviteTrips]
      summary: Confirm and book the invite trip
      parameters:
        - name: inviteTripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteTrip"

  # Rentals
  /rentals:
    get:
      operationId: listRentals
      tags: [rentals]
      summary: List available rental cars
      parameters:
        - name: vehicleType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalCarList"
    post:
      operationId: createRentalBooking
      tags: [rentals]
      summary: Book a rental car
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRentalBookingBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalBooking"

  /rentals/my-bookings:
    get:
      operationId: listMyRentalBookings
      tags: [rentals]
      summary: List my rental bookings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalBookingList"

  /rentals/{rentalId}:
    get:
      operationId: getRentalBooking
      tags: [rentals]
      parameters:
        - name: rentalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalBooking"
    delete:
      operationId: cancelRentalBooking
      tags: [rentals]
      parameters:
        - name: rentalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalBooking"

  # Driver Bookings
  /driver-bookings:
    get:
      operationId: listDriverBookings
      tags: [driverBookings]
      summary: List my driver bookings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverBookingList"
    post:
      operationId: createDriverBooking
      tags: [driverBookings]
      summary: Book a private driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriverBookingBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverBooking"

  /driver-bookings/{bookingId}:
    get:
      operationId: getDriverBooking
      tags: [driverBookings]
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverBooking"
    patch:
      operationId: updateDriverBooking
      tags: [driverBookings]
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDriverBookingBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverBooking"

  # Driver Portal
  /driver-portal/me:
    get:
      operationId: getDriverProfile
      tags: [driverPortal]
      summary: Get my driver profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverProfile"

  /driver-portal/availability:
    patch:
      operationId: updateDriverAvailability
      tags: [driverPortal]
      summary: Toggle online/offline status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvailabilityBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverProfile"

  /driver-portal/trips:
    get:
      operationId: getDriverTrips
      tags: [driverPortal]
      summary: Get my assigned rides as driver
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideList"

  /driver-portal/earnings:
    get:
      operationId: getDriverEarnings
      tags: [driverPortal]
      summary: Get driver earnings summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverEarnings"

  /driver-portal/stats:
    get:
      operationId: getDriverStats
      tags: [driverPortal]
      summary: Get driver stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverStats"

  # Admin
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Full admin statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [passenger, driver, admin]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, banned]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserList"

  /admin/users/{userId}/status:
    patch:
      operationId: updateUserStatus
      tags: [admin]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/drivers:
    get:
      operationId: listAdminDrivers
      tags: [admin]
      summary: List all drivers
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, suspended]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDriverList"

  /admin/drivers/{driverId}/status:
    patch:
      operationId: updateDriverStatus
      tags: [admin]
      parameters:
        - name: driverId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDriverStatusBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /admin/trips:
    get:
      operationId: listAdminTrips
      tags: [admin]
      summary: List all trips/rides
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideList"

  /admin/group-trips:
    get:
      operationId: listAdminGroupTrips
      tags: [admin]
      summary: List all group trips
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupTripList"

  # Stats
  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/my-activity:
    get:
      operationId: getMyActivity
      tags: [stats]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserActivity"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [passenger, driver, admin]
          default: passenger
      required: [name, phone, password]

    LoginBody:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string
      required: [phone, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [passenger, driver, admin]
        avatarUrl:
          type: string
          nullable: true
        rating:
          type: number
          nullable: true
        status:
          type: string
          enum: [active, suspended, banned]
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, phone, role, createdAt]

    Driver:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        phone:
          type: string
        vehicleMake:
          type: string
        vehicleModel:
          type: string
        vehicleYear:
          type: integer
        vehiclePlate:
          type: string
        vehicleType:
          type: string
          enum: [economy, comfort, xl, bus, van, minibus]
        rating:
          type: number
          nullable: true
        totalTrips:
          type: integer
        isAvailable:
          type: boolean
        driverStatus:
          type: string
          enum: [pending, approved, rejected, suspended]
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, userId, name, phone, vehicleMake, vehicleModel, vehicleYear, vehiclePlate, vehicleType, totalTrips, isAvailable, createdAt]

    DriverList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Driver"
        total:
          type: integer
      required: [items, total]

    CreateDriverBody:
      type: object
      properties:
        vehicleMake:
          type: string
        vehicleModel:
          type: string
        vehicleYear:
          type: integer
        vehiclePlate:
          type: string
        vehicleType:
          type: string
          enum: [economy, comfort, xl, bus, van, minibus]
      required: [vehicleMake, vehicleModel, vehicleYear, vehiclePlate, vehicleType]

    Ride:
      type: object
      properties:
        id:
          type: integer
        passengerId:
          type: integer
        driverId:
          type: integer
          nullable: true
