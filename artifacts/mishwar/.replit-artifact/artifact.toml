kind = "web"
previewPath = "/"
title = "مشوار"
version = "1.0.0"
id = "artifacts/mishwar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24822

[services.development]
run = "pnpm --filter @workspace/mishwar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mishwar", "run", "build" ]
publicDir = "artifacts/mishwar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24822"
BASE_PATH = "/"
